timezone: Australia/Sydney
schedule:
  morning: "07:00"
  afternoon: "11:30"
paths:
  data_dir: "./data"
  output_dir: "./output"
  assets_dir: "./assets"
run:
  global_time_budget_seconds: 7200
  per_source_timeout_seconds: 30
  lookback_hours:
    morning: 18
    afternoon: 6
  shipped_suppression_days: 14
synthesis:
  provider: "anthropic"
  model: "claude-opus-4-8"            # enrich_item, top_line, watchpoints
  classify_model: "claude-haiku-4-5-20251001"  # bulk classification (~80% of calls)
  max_retries: 3
brief:
  theme: "light"                # "light" | "dark"
