# Nginx reverse-proxy config for kestrel.quantrim.com
# Place at: /etc/nginx/sites-available/kestrel
# Enable with: sudo ln -s /etc/nginx/sites-available/kestrel /etc/nginx/sites-enabled/
# Reload with: sudo nginx -s reload

server {
    listen 80;
    server_name kestrel.quantrim.com;

    # Redirect HTTP → HTTPS (after obtaining SSL cert)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kestrel.quantrim.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d kestrel.quantrim.com)
    ssl_certificate     /etc/letsencrypt/live/kestrel.quantrim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kestrel.quantrim.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "strict-origin"          always;
    add_header Strict-Transport-Security "max-age=31536000"    always;

    # Proxy to FastAPI / uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location /static/ {
        proxy_pass       http://127.0.0.1:8080/static/;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 1024;
}
